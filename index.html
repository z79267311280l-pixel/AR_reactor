<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>АСММ: реактор РИТМ-200Н в AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #111;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-radius: 8px;
            margin: 0 20px;
        }
        @media (max-width: 600px) {
            .info { font-size: 11px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <model-viewer 
        id="reactor-viewer"
        src="model.glb"
        alt="3D модель реактора РИТМ-200Н"
        ar 
        ar-modes="scene-viewer webxr quick-look"
        camera-controls 
        touch-action="pan-y"
        scale="0.5 0.5 0.5"
        autoplay
        shadow-intensity="0.5"
        exposure="1.2"
        environment-image="neutral"
        style="background-color: #1a1a2e;">
    </model-viewer>
    <div class="info">
        🖱️ Вращайте пальцем/мышью | ✨ Нажмите на иконку AR (📱) для дополненной реальности<br>
        📏 Масштабируйте двумя пальцами (pinch) или колесиком мыши
    </div>
    <script>
        const viewer = document.getElementById('reactor-viewer');
        viewer.addEventListener('load', () => {
            console.log('Модель загружена');
            // При необходимости уменьшите масштаб ещё сильнее, изменив значение scale в теге model-viewer.
        });
        viewer.addEventListener('error', (err) => {
            console.error('Ошибка загрузки модели:', err);
            document.querySelector('.info').innerHTML += '<br>⚠️ Не удалось загрузить модель. Проверьте файл model.glb и доступ к нему.';
        });
    </script>
</body>
</html>
