<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>3D модель реактора РИТМ-200Н</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #111;
        }
        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.65);
            color: #eee;
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            border-radius: 12px;
            margin: 0 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .controls-info a {
            color: #88ddff;
            pointer-events: auto;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .controls-info { font-size: 12px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <model-viewer 
        id="reactor-viewer"
        src="model.glb"
        alt="Реактор РИТМ-200Н"
        camera-controls 
        touch-action="pan-y"
        scale="0.05 0.05 0.05"
        min-scale="0.01"
        max-scale="10"
        interaction-prompt="auto"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="0.5"
        style="background-color: #1a1a2e;">
    </model-viewer>
    <div class="controls-info">
        🖱️ <strong>Управление:</strong> вращайте пальцем (или мышью) | 📏 масштабируйте двумя пальцами (pinch) или колесиком мыши<br>
        ✨ <strong>AR-режим:</strong> если на модели появится значок 📱 — нажмите его, чтобы разместить модель в реальном мире.<br>
        <span style="font-size: 12px;">⚙️ Если модель слишком мала/велика, используйте масштабирование жестами.</span>
    </div>
    <script>
        const viewer = document.getElementById('reactor-viewer');
        viewer.addEventListener('load', () => {
            console.log('Модель загружена успешно');
            // При необходимости можно добавить автоматическую центровку
            viewer.cameraTarget = 'auto';
        });
        viewer.addEventListener('error', (err) => {
            console.error('Ошибка загрузки модели:', err);
            const info = document.querySelector('.controls-info');
            if (info) info.innerHTML += '<br><span style="color: #ff8888;">❌ Не удалось загрузить модель. Проверьте файл model.glb и доступ к нему.</span>';
        });
    </script>
</body>
</html>
