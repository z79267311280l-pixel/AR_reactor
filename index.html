<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR модель</title>
    <script type="importmap">
        { "imports": { "@google/model-viewer": "https://unpkg.com/@google/model-viewer@latest/dist/model-viewer.min.js" } }
    </script>
    <script type="module">import '@google/model-viewer';</script>
    <style>
        model-viewer { 
            width: 100%; 
            height: 100vh; 
        }
    </style>
</head>
<body>
    <!-- Основные изменения: -->
    <!-- 1. Добавлен атрибут ios-src, указывающий на USDZ-модель для iOS. 
        2. Изменён порядок ar-modes: quick-look теперь на первом месте для iOS. 
        3. Добавлен атрибут ar-scale, чтобы модель была видимого размера. -->
    <model-viewer 
        src="model01.glb" 
        ios-src="model01.usdz" 
        ar 
        ar-modes="quick-look scene-viewer webxr" 
        ar-scale="auto"
        camera-controls 
        auto-rotate>
    </model-viewer>
</body>
</html>
