<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR модель с управлением и аннотациями</title>
    <!-- Импорт model-viewer -->
    <script type="importmap">
        {
            "imports": {
                "@google/model-viewer": "https://unpkg.com/@google/model-viewer@latest/dist/model-viewer.min.js"
            }
        }
    </script>
    <script type="module">import '@google/model-viewer';</script>
    <style>
        /* Основной контейнер занимает весь экран */
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #111;
        }

        /* Стили для текстовых подписей (хотспотов) */
        .hotspot {
            display: block;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 12px;
            border-radius: 24px;
            font-size: 14px;
            font-family: system-ui, 'Segoe UI', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border-left: 3px solid #ffaa00;
            pointer-events: none; /* чтобы не мешать кликам по модели */
            backdrop-filter: blur(4px);
        }

        /* Адаптация для мобильных устройств */
        @media (max-width: 768px) {
            .hotspot {
                font-size: 10px;
                padding: 4px 8px;
                white-space: nowrap;
            }
        }

        /* Панель управления – плавающая, поверх 3D */
        .control-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 20px;
            border-radius: 16px;
            font-family: system-ui, 'Segoe UI', sans-serif;
            font-size: 14px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .controls-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
        }

        .control-item label {
            font-size: 12px;
            opacity: 0.8;
        }

        input[type="range"] {
            width: 140px;
            cursor: pointer;
            background: #3a6ea5;
            height: 3px;
            border-radius: 3px;
        }

        button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        button:hover {
            background: #1f5e7a;
        }

        .value-display {
            font-weight: bold;
            color: #ffaa66;
        }

        @media (max-width: 700px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 12px;
            }
            .controls-group {
                justify-content: space-between;
            }
            .control-item {
                min-width: auto;
                flex: 1;
            }
            input[type="range"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- 3D-модель с AR и аннотациями -->
    <!-- rotation="0 0 0" оставлен нулевым, так как управление будет через camera-orbit -->
    <model-viewer 
        id="ar-model"
        src="model01.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        auto-rotate 
        rotation="0 0 0"
        style="width: 100%; height: 100vh;"
        camera-orbit="0deg 0deg 3m"
        camera-target="0 0 0">
        
        <!-- ========= АННОТАЦИИ (хотспоты) ========= -->
        <!-- ⚠️ ВНИМАНИЕ: координаты (data-position) нужно подобрать под вашу модель!
             Как это сделать: загрузите model01.glb в https://modelviewer.dev/editor/
             наведите курсор на нужную деталь и скопируйте координаты X Y Z.
             Здесь указаны примерные значения для демонстрации. -->
        
        <!-- Корпус реактора -->
        <div class="hotspot" slot="hotspot-reactor" data-position="0.2 0.8 0.5" data-normal="0 1 0">
            ⚛️ Корпус реактора
        </div>
        
        <!-- Насосы -->
        <div class="hotspot" slot="hotspot-pumps" data-position="-0.7 0.3 0.6" data-normal="0 1 0">
            🌀 Насосы
        </div>
        
        <!-- Парогенераторы -->
        <div class="hotspot" slot="hotspot-steam" data-position="0.4 1.0 -0.6" data-normal="0 1 0">
            💨 Парогенераторы
        </div>
        
        <!-- СУЗ (система управления и защиты) -->
        <div class="hotspot" slot="hotspot-suz" data-position="0.0 1.2 -0.2" data-normal="0 1 0">
            🎛️ СУЗ
        </div>
        
    </model-viewer>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ ПОЛОЖЕНИЕМ (камера) -->
    <div class="control-panel">
        <div style="font-weight: bold; font-size: 14px;">🕹️ Управление видом</div>
        <div class="controls-group">
            <div class="control-item">
                <label>↔️ Горизонтальный угол: <span id="theta-val" class="value-display">0</span>°</label>
                <input type="range" id="theta-slider" min="-180" max="180" value="0" step="1">
            </div>
            <div class="control-item">
                <label>↕️ Вертикальный угол: <span id="phi-val" class="value-display">0</span>°</label>
                <input type="range" id="phi-slider" min="-90" max="90" value="0" step="1">
            </div>
            <div class="control-item">
                <label>🔍 Приближение: <span id="radius-val" class="value-display">3.0</span> м</label>
                <input type="range" id="radius-slider" min="0.8" max="8" value="3" step="0.05">
            </div>
            <button id="reset-view-btn">⟳ Сбросить вид</button>
        </div>
        <div style="font-size: 11px; opacity: 0.6; text-align: right;">
            💡 Подписи привязаны к модели. Координаты хотспотов нужно настроить под вашу модель.
        </div>
    </div>

    <script type="module">
        // Получаем элемент model-viewer
        const modelViewer = document.getElementById('ar-model');
        
        // Элементы управления
        const thetaSlider = document.getElementById('theta-slider');
        const phiSlider = document.getElementById('phi-slider');
        const radiusSlider = document.getElementById('radius-slider');
        const thetaVal = document.getElementById('theta-val');
        const phiVal = document.getElementById('phi-val');
        const radiusVal = document.getElementById('radius-val');
        const resetBtn = document.getElementById('reset-view-btn');

        // Функция обновления камеры из значений слайдеров
        function updateCameraFromSliders() {
            const theta = parseFloat(thetaSlider.value);
            const phi = parseFloat(phiSlider.value);
            const radius = parseFloat(radiusSlider.value);
            
            // Устанавливаем параметры камеры
            modelViewer.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
            
            // Обновляем отображаемые значения
            thetaVal.textContent = theta;
            phiVal.textContent = phi;
            radiusVal.textContent = radius.toFixed(2);
        }

        // Назначаем обработчики на ползунки
        thetaSlider.addEventListener('input', updateCameraFromSliders);
        phiSlider.addEventListener('input', updateCameraFromSliders);
        radiusSlider.addEventListener('input', updateCameraFromSliders);
        
        // Кнопка сброса – возвращает камеру в исходное положение и слайдеры в ноль
        resetBtn.addEventListener('click', () => {
            thetaSlider.value = '0';
            phiSlider.value = '0';
            radiusSlider.value = '3';
            updateCameraFromSliders();
            // Дополнительно: можно сбросить цель камеры на центр модели
            modelViewer.cameraTarget = '0 0 0';
        });
        
        // Небольшая задержка, чтобы модель загрузилась, и применить начальные значения
        // Также отключаем авто-вращение при ручном управлении? Не обязательно, но можно.
        // Чтобы авто-вращение не мешало, можно его отключить при взаимодействии, но оставим как есть.
        // Если хотите отключить авто-вращение при первом вмешательстве, добавьте:
        modelViewer.addEventListener('load', () => {
            updateCameraFromSliders();
        });
        
        // Для уверенности – вызываем через секунду после загрузки страницы
        setTimeout(() => {
            if (modelViewer.loaded) updateCameraFromSliders();
        }, 1000);
    </script>
</body>
</html>
